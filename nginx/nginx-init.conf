# Temporary config for initial SSL certificate
# After getting cert, replace with nginx.conf
server {
    listen 80;
    server_name blugen.ir www.blugen.ir;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Serve app on HTTP until cert is ready
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}
